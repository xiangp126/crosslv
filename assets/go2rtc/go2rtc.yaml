# ================================================================
# GO2RTC - 4K Zero-Latency Configuration
# ================================================================
# [Usage Notes]
# 1. Web UI: http://192.168.10.240:1984 (default: admin / password)
# 2. RTSP URLs (if rtsp section is enabled):
#    - 4K stream:  rtsp://admin:password@192.168.10.240:8554/cam_4k
#    - Standard:   rtsp://admin:password@192.168.10.240:8554/cam_std
# 3. Parameter notes:
#    - subtype=3: locks 4K resolution
#    - subtype=2: locks 1080P/2K resolution
#    - #audio=pcmu: forces audio decode, fixes no-sound on some devices
# =================================================================

ffmpeg:
  bin: "E:\\FFDownloads\\ffmpeg\\bin\\ffmpeg.exe"

log:
  level: info

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  candidates:
    - 192.168.10.240:8555

# ================================================================
# STREAM PIPELINE
# ================================================================

streams:
  # 1. Raw streams (H265 4K)
  # subtype: 0=SD, 1=HD, 2=1080p, 3=4K (highest resolution available)
  # stream:  0=main stream (high quality), 1=sub stream (lower quality, less bandwidth)
  #
  # Camera settings:
  #   uid:     *********
  #   region:  cn
  #   model:   chuangmi.camera.81ac1
  #   subtype: 3 (4K)
  #   stream:  0 (main)
  #
  # [Optimization] Added #backlog=2MB to handle high-bitrate 4K bursts and fix 'buffer full' errors.

  # Camera 01: ip=*.*.*.*  did=**********
  c700_01_raw:
    - "xiaomi://*********:cn@*.*.*.*?did=**********&model=chuangmi.camera.81ac1&subtype=3&stream=0#backlog=2MB#async"
  c700_01_1080p:
    - "ffmpeg:c700_01_raw#video=h264#hardware#width=1920#height=1080#async"

  # Camera 02: ip=*.*.*.*  did=**********
  c700_02_raw:
    - "xiaomi://*********:cn@*.*.*.*?did=**********&model=chuangmi.camera.81ac1&subtype=3&stream=0#backlog=2MB#async"
  c700_02_1080p:
    - "ffmpeg:c700_02_raw#video=h264#hardware#width=1920#height=1080#async"

  # Camera 03: ip=*.*.*.*  did=**********
  c700_03_raw:
    - "xiaomi://*********:cn@*.*.*.*?did=**********&model=chuangmi.camera.81ac1&subtype=3&stream=0#backlog=2MB#async"
  c700_03_1080p:
    - "ffmpeg:c700_03_raw#video=h264#hardware#width=1920#height=1080#async"

  # Camera 04: ip=*.*.*.*  did=**********
  c700_04_raw:
    - "xiaomi://*********:cn@*.*.*.*?did=**********&model=chuangmi.camera.81ac1&subtype=3&stream=0#backlog=2MB#async"
  c700_04_1080p:
    - "ffmpeg:c700_04_raw#video=h264#hardware#width=1920#height=1080#async"

  # 2. WebRTC Output (Transcoded with Hardware Acceleration) — kept for reference.
  # Using #hardware forces go2rtc to find the best available encoder (NVENC).
  # [Final Optimization]
  # - #audio=opus: Native WebRTC audio for instant playback.
  # - #async: Decouples FFmpeg processing to prevent buffer overflow on the server side.
  # c700_01_h264:
  #   - "ffmpeg:c700_01_raw#video=h264#hardware#audio=opus#async"
  # c700_02_h264:
  #   - "ffmpeg:c700_02_raw#video=h264#hardware#audio=opus#async"

xiaomi:
  "*********":
