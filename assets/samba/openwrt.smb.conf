[global]
	netbios name = wrt32x
	interfaces = br-lan
	server string = WRT32X NAS
	workgroup = WORKGROUP
	bind interfaces only = yes
	deadtime = 30
	enable core files = no
	invalid users = root

	# Act as local master browser for NetBIOS name resolution
	local master = yes
	preferred master = yes
	os level = 20

	map to guest = Bad User
	min protocol = SMB2
	max protocol = SMB3

	# Disable SMB3 encryption: ARM CPU bottleneck, LAN does not need it
	smb encrypt = off

	passdb backend = smbpasswd
	security = user
	smb passwd file = /etc/samba/smbpasswd
	load printers = no

	# Performance tuning
	socket options = TCP_NODELAY IPTOS_LOWDELAY
	max xmit = 65535
	min receivefile size = 16384
	use sendfile = yes
	aio read size = 16384
	aio write size = 16384

	# Multi-device safety: real oplocks to prevent data corruption
	# when the same file is opened from multiple devices
	fake oplocks = no
	oplocks = yes
	level2 oplocks = yes
	kernel oplocks = no
	strict locking = auto

	# Resource limits
	max connections = 20
	log level = 1
	max log size = 100

	# Listen on both SMB and NetBIOS ports for better client compatibility
	smb ports = 445 139

[c700_01]
	path = /mnt/sda1
	valid users = pi
	force user = pi
	read only = no
	guest ok = no
	create mask = 0664
	directory mask = 0775
	browseable = yes
	writable = yes

[c700_02]
	path = /mnt/sda2
	valid users = pi
	force user = pi
	read only = no
	guest ok = no
	create mask = 0664
	directory mask = 0775
	browseable = yes
	writable = yes
