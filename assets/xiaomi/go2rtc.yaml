# ================================================================
# GO2RTC config — lives on the Frigate/Windows box 192.168.10.240
#   path on that box: E:\Docker\frigate\go2rtc\go2rtc.yaml
# Saved copy of the AS-RUNNING config. REDACTED for the repo: <UID> (Mi account uid),
# <DID_01..04> (per-camera device ids), <XIAOMI_AUTH_TOKEN> (the V1:... token).
# Put the real values back (from the .240 box) when deploying.
# Provides the live streams the player's "看直播 / 直播分屏" embeds via WebRTC.
# ================================================================
# Param notes: subtype=3 => 4K, subtype=2 => 1080P ; stream=0 = main channel.

ffmpeg:
  bin: "E:\\FFDownloads\\ffmpeg\\bin\\ffmpeg.exe"

log:
  level: info

api:
  listen: ":1984"
  origin: "*"        # allow cross-origin WS + CORS, so the player page on
                     # wrt32x:8800 can embed the <video-stream> grid.
                     # Without this go2rtc returns 403 on cross-origin WS.

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  candidates:
    - 192.168.10.240:8555     # advertise the reachable LAN host candidate

# ================================================================
# STREAM PIPELINE  (4 Xiaomi C700 cams, model chuangmi.camera.81ac1, uid <UID>)
#   *_raw     : 4K H265 main  -> recording / RTSP / Frigate (subtype=3, ~3840x2160)
#   *_sub1080 : 1080p H265     -> the light feed the browser plays directly over
#               WebRTC on H265-capable browsers (subtype=2&stream=0, verified 1920x1080)
#   *_1080p   : H264 for browsers, transcoded from *_sub1080 (#hardware=cuda, audio passthrough)
#               — the fallback for browsers without WebRTC-H265 (Firefox/Edge-default).
# Why source the transcode from *_sub1080, not 4K *_raw: the 4K main overflowed
# go2rtc's buffer ("cs2: pop buffer is full") and the 4K->1080p transcode kept dying
# ("ffmpeg ... EOF"), freezing live. The 1080p sub is light enough to be stable.
# audio=copy (not =opus): the sub audio is already OPUS; re-encoding reintroduced the EOF.
# Player mapping: 原画1080P=*_sub1080 (H265 direct) · 转码1080P=*_1080p (H264).
# ================================================================

streams:

  # ---- Camera 01: 192.168.10.221 / did=<DID_01> ----
  c700_01_raw:
    - "xiaomi://<UID>:cn@192.168.10.221?did=<DID_01>&model=chuangmi.camera.81ac1&subtype=3&stream=0#backlog=16MB#async"
  c700_01_sub1080:
    - "xiaomi://<UID>:cn@192.168.10.221?did=<DID_01>&model=chuangmi.camera.81ac1&subtype=2&stream=0#backlog=4MB#async"
  c700_01_1080p:
    - "ffmpeg:c700_01_sub1080#video=h264#audio=copy#hardware=cuda#async"

  # ---- Camera 02: 192.168.10.222 / did=<DID_02> ----
  c700_02_raw:
    - "xiaomi://<UID>:cn@192.168.10.222?did=<DID_02>&model=chuangmi.camera.81ac1&subtype=3&stream=0#backlog=16MB#async"
  c700_02_sub1080:
    - "xiaomi://<UID>:cn@192.168.10.222?did=<DID_02>&model=chuangmi.camera.81ac1&subtype=2&stream=0#backlog=4MB#async"
  c700_02_1080p:
    - "ffmpeg:c700_02_sub1080#video=h264#audio=copy#hardware=cuda#async"

  # ---- Camera 03: 192.168.10.223 / did=<DID_03> ----
  c700_03_raw:
    - "xiaomi://<UID>:cn@192.168.10.223?did=<DID_03>&model=chuangmi.camera.81ac1&subtype=3&stream=0#backlog=16MB#async"
  c700_03_sub1080:
    - "xiaomi://<UID>:cn@192.168.10.223?did=<DID_03>&model=chuangmi.camera.81ac1&subtype=2&stream=0#backlog=4MB#async"
  c700_03_1080p:
    - "ffmpeg:c700_03_sub1080#video=h264#audio=copy#hardware=cuda#async"

  # ---- Camera 04: 192.168.10.224 / did=<DID_04> ----
  c700_04_raw:
    - "xiaomi://<UID>:cn@192.168.10.224?did=<DID_04>&model=chuangmi.camera.81ac1&subtype=3&stream=0#backlog=16MB#async"
  c700_04_sub1080:
    - "xiaomi://<UID>:cn@192.168.10.224?did=<DID_04>&model=chuangmi.camera.81ac1&subtype=2&stream=0#backlog=4MB#async"
  c700_04_1080p:
    - "ffmpeg:c700_04_sub1080#video=h264#audio=copy#hardware=cuda#async"

xiaomi:
  "<UID>": <XIAOMI_AUTH_TOKEN>   # REDACTED — real V1:... token is on the .240 box
